<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Milena - Mis 10 Años</title>
  <meta name="description" content="¡Estás invitado al cumpleaños de Milena! 7 de Junio, Quinta Estilo Campo.">
  <meta property="og:title" content="Milena - Mis 10 Años">
  <meta property="og:description" content="¡Estás invitado al cumpleaños de Milena! 7 de Junio, Quinta Estilo Campo.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Josefin+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: 'Josefin Sans', sans-serif;
    }

    body {
      background-color: #A47DAB;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── Sparkle canvas ── */
    #sparkles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Bow layer ── */
    .bows-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    .bow {
      position: absolute;
      opacity: 0;
      animation: bowFloat 8s ease-in-out infinite, bowFadeIn 1.5s ease-out forwards;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    }

    @keyframes bowFloat {
      0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
      25% { transform: translateY(-18px) rotate(5deg) scale(1.04); }
      50% { transform: translateY(-8px) rotate(-3deg) scale(1); }
      75% { transform: translateY(-22px) rotate(4deg) scale(1.02); }
    }

    @keyframes bowFadeIn {
      to { opacity: 0.85; }
    }

    /* ── Main invitation card ── */
    .invitation {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
      text-align: center;
      width: 100%;
      max-width: 720px;
    }

    /* ── Decorative top border ── */
    .top-ornament {
      width: 180px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,0,0,0.5), transparent);
      margin-bottom: 12px;
      opacity: 0;
      animation: slideUp 1s ease-out 0.3s forwards;
    }

    .stars-row {
      display: flex;
      gap: 14px;
      margin-bottom: 28px;
      opacity: 0;
      animation: slideUp 1s ease-out 0.5s forwards;
    }

    .star-icon {
      width: 18px;
      height: 18px;
      animation: starTwinkle 2s ease-in-out infinite;
    }

    .star-icon:nth-child(2) { animation-delay: 0.3s; }
    .star-icon:nth-child(3) { animation-delay: 0.7s; }
    .star-icon:nth-child(4) { animation-delay: 1s; }
    .star-icon:nth-child(5) { animation-delay: 0.5s; }

    @keyframes starTwinkle {
      0%, 100% { opacity: 0.5; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    /* ── Main title ── */
    .main-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(2.6rem, 9vw, 5rem);
      color: #000;
      line-height: 1.2;
      margin-bottom: 36px;
      opacity: 0;
      animation: slideUp 1.2s ease-out 0.7s forwards;
      position: relative;
    }

    /* ── Divider ── */
    .divider {
      width: 60px;
      height: 1px;
      background: rgba(0,0,0,0.35);
      margin-bottom: 32px;
      opacity: 0;
      animation: slideUp 1s ease-out 0.9s forwards;
    }

    /* ── Event details ── */
    .details-block {
      opacity: 0;
      animation: slideUp 1s ease-out 1.1s forwards;
      margin-bottom: 18px;
    }

    .detail-label {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 400;
      font-size: clamp(0.6rem, 1.8vw, 0.75rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.45);
      margin-bottom: 5px;
    }

    .detail-value {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: clamp(1.05rem, 3.2vw, 1.4rem);
      color: #000;
      letter-spacing: 0.04em;
    }

    .detail-value-small {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(0.9rem, 2.6vw, 1.15rem);
      color: rgba(0,0,0,0.75);
      letter-spacing: 0.02em;
    }

    .location-link {
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform 0.3s ease;
    }

    .location-link:hover {
      transform: scale(1.03);
    }

    .detail-map-hint {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(0.55rem, 1.5vw, 0.7rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.4);
      margin-top: 4px;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .details-block-2 {
      opacity: 0;
      animation: slideUp 1s ease-out 1.3s forwards;
      margin-bottom: 18px;
    }

    .details-block-3 {
      opacity: 0;
      animation: slideUp 1s ease-out 1.5s forwards;
      margin-bottom: 40px;
    }

    /* ── Bottom ornament ── */
    .bottom-ornament {
      width: 180px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,0,0,0.5), transparent);
      opacity: 0;
      animation: slideUp 1s ease-out 1.7s forwards;
    }

    .te-esperamos {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.1rem, 3.5vw, 1.6rem);
      color: rgba(0,0,0,0.6);
      margin-top: 20px;
      opacity: 0;
      animation: slideUp 1s ease-out 1.9s forwards;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Silver shimmer overlay ── */
    .shimmer-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 3;
      background: linear-gradient(
        135deg,
        transparent 40%,
        rgba(220, 220, 230, 0.08) 45%,
        rgba(255, 255, 255, 0.12) 50%,
        rgba(220, 220, 230, 0.08) 55%,
        transparent 60%
      );
      background-size: 300% 300%;
      animation: shimmerMove 6s ease-in-out infinite;
    }

    @keyframes shimmerMove {
      0% { background-position: 100% 0%; }
      50% { background-position: 0% 100%; }
      100% { background-position: 100% 0%; }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .invitation {
        padding: 32px 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Silver sparkle particles -->
  <canvas id="sparkles"></canvas>

  <!-- Silver shimmer sweep -->
  <div class="shimmer-overlay"></div>

  <!-- Black bows layer -->
  <div class="bows-container" id="bowsContainer"></div>

  <!-- Invitation content -->
  <main class="invitation">
    <div class="top-ornament"></div>

    <div class="stars-row">
      <svg class="star-icon" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" fill="rgba(192,192,192,0.7)"/>
      </svg>
      <svg class="star-icon" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" fill="rgba(192,192,192,0.7)"/>
      </svg>
      <svg class="star-icon" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" fill="rgba(192,192,192,0.7)"/>
      </svg>
      <svg class="star-icon" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" fill="rgba(192,192,192,0.7)"/>
      </svg>
      <svg class="star-icon" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" fill="rgba(192,192,192,0.7)"/>
      </svg>
    </div>

    <h1 class="main-title">Milena<br>mis 10 a&ntilde;os</h1>

    <div class="divider"></div>

    <div class="details-block">
      <p class="detail-label">Fecha</p>
      <p class="detail-value">7 de Junio</p>
      <p class="detail-value-small">12:30 hs a 17:30 hs</p>
    </div>

    <div class="details-block-2">
      <p class="detail-label">Lugar</p>
      <a href="https://maps.app.goo.gl/NDVStRVDPLkGuZ9R6" target="_blank" rel="noopener" class="location-link">
        <p class="detail-value">Quinta Estilo Campo</p>
        <p class="detail-value-small">Guatemala 1748, Luis Guill&oacute;n</p>
        <p class="detail-map-hint">Ver en mapa</p>
      </a>
    </div>

    <div class="details-block-3">
      <p class="detail-label">&iexcl;Te esperamos!</p>
    </div>

    <div class="bottom-ornament"></div>

    <p class="te-esperamos">No faltes&hellip;</p>
  </main>

  <script>
    // ── Silver Sparkles on Canvas ──
    (function () {
      const canvas = document.getElementById('sparkles');
      const ctx = canvas.getContext('2d');
      let particles = [];
      let w, h;

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      class Sparkle {
        constructor() {
          this.reset();
          this.y = Math.random() * h;
          this.fadeIn = Math.random() * 60;
        }
        reset() {
          this.x = Math.random() * w;
          this.y = -10;
          this.size = Math.random() * 3 + 1;
          this.speedY = Math.random() * 0.6 + 0.15;
          this.speedX = (Math.random() - 0.5) * 0.3;
          this.opacity = 0;
          this.maxOpacity = Math.random() * 0.7 + 0.3;
          this.flickerSpeed = Math.random() * 0.03 + 0.01;
          this.flickerOffset = Math.random() * Math.PI * 2;
          this.life = 0;
          this.maxLife = Math.random() * 400 + 200;
          this.type = Math.random() > 0.6 ? 'star' : 'dot';
        }
        update() {
          this.life++;
          this.y += this.speedY;
          this.x += this.speedX;

          // fade in and out
          const lifeRatio = this.life / this.maxLife;
          if (lifeRatio < 0.1) {
            this.opacity = (lifeRatio / 0.1) * this.maxOpacity;
          } else if (lifeRatio > 0.8) {
            this.opacity = ((1 - lifeRatio) / 0.2) * this.maxOpacity;
          } else {
            this.opacity = this.maxOpacity;
          }

          // flicker
          this.opacity *= (0.7 + 0.3 * Math.sin(this.life * this.flickerSpeed + this.flickerOffset));

          if (this.life >= this.maxLife || this.y > h + 10) {
            this.reset();
          }
        }
        draw() {
          ctx.save();
          ctx.globalAlpha = Math.max(0, this.opacity);

          if (this.type === 'star') {
            // 4-point star sparkle
            const s = this.size;
            ctx.translate(this.x, this.y);
            ctx.fillStyle = `rgba(220, 220, 235, 1)`;
            ctx.beginPath();
            for (let i = 0; i < 4; i++) {
              const angle = (i * Math.PI) / 2;
              ctx.moveTo(0, 0);
              ctx.lineTo(Math.cos(angle - 0.15) * s * 0.4, Math.sin(angle - 0.15) * s * 0.4);
              ctx.lineTo(Math.cos(angle) * s * 2.2, Math.sin(angle) * s * 2.2);
              ctx.lineTo(Math.cos(angle + 0.15) * s * 0.4, Math.sin(angle + 0.15) * s * 0.4);
            }
            ctx.closePath();
            ctx.fill();

            // glow
            ctx.globalAlpha = this.opacity * 0.3;
            ctx.fillStyle = `rgba(255, 255, 255, 1)`;
            ctx.beginPath();
            ctx.arc(0, 0, s * 1.5, 0, Math.PI * 2);
            ctx.fill();
          } else {
            // simple glowing dot
            const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2);
            gradient.addColorStop(0, 'rgba(230, 230, 240, 1)');
            gradient.addColorStop(0.5, 'rgba(200, 200, 215, 0.5)');
            gradient.addColorStop(1, 'rgba(200, 200, 215, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.restore();
        }
      }

      // Create particles
      const count = Math.min(120, Math.floor((w * h) / 8000));
      for (let i = 0; i < count; i++) {
        particles.push(new Sparkle());
      }

      function animate() {
        ctx.clearRect(0, 0, w, h);
        for (const p of particles) {
          p.update();
          p.draw();
        }
        requestAnimationFrame(animate);
      }
      animate();
    })();

    // ── Black Bows (SVG) ──
    (function () {
      const container = document.getElementById('bowsContainer');
      const bowSVG = `<svg viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
        <g fill="#1a1a1a">
          <!-- Left loop -->
          <ellipse cx="30" cy="25" rx="26" ry="16" transform="rotate(-15 30 25)"/>
          <!-- Right loop -->
          <ellipse cx="70" cy="25" rx="26" ry="16" transform="rotate(15 70 25)"/>
          <!-- Center knot -->
          <ellipse cx="50" cy="28" rx="9" ry="11"/>
          <!-- Left tail -->
          <path d="M42 35 Q30 50 18 58 Q22 48 28 38 Z"/>
          <!-- Right tail -->
          <path d="M58 35 Q70 50 82 58 Q78 48 72 38 Z"/>
        </g>
        <!-- Shine on loops -->
        <ellipse cx="25" cy="20" rx="10" ry="5" fill="rgba(80,80,80,0.25)" transform="rotate(-20 25 20)"/>
        <ellipse cx="75" cy="20" rx="10" ry="5" fill="rgba(80,80,80,0.25)" transform="rotate(20 75 20)"/>
      </svg>`;

      const positions = [
        { top: '3%', left: '4%', size: 70, delay: 0, duration: 7 },
        { top: '8%', right: '5%', size: 60, delay: 0.8, duration: 9 },
        { top: '25%', left: '2%', size: 50, delay: 1.5, duration: 8 },
        { top: '35%', right: '3%', size: 55, delay: 0.3, duration: 7.5 },
        { bottom: '30%', left: '5%', size: 48, delay: 2, duration: 8.5 },
        { bottom: '20%', right: '4%', size: 65, delay: 1, duration: 7 },
        { bottom: '8%', left: '8%', size: 55, delay: 1.8, duration: 9 },
        { bottom: '5%', right: '6%', size: 52, delay: 0.5, duration: 8 },
        { top: '55%', left: '1%', size: 42, delay: 2.5, duration: 7.8 },
        { top: '70%', right: '2%', size: 46, delay: 1.2, duration: 8.2 },
        // Additional bows for more coverage
        { top: '15%', left: '85%', size: 44, delay: 3, duration: 7.3 },
        { top: '48%', right: '92%', size: 40, delay: 2.2, duration: 8.7 },
        { bottom: '42%', left: '90%', size: 38, delay: 0.7, duration: 9.2 },
        { bottom: '55%', right: '88%', size: 50, delay: 1.6, duration: 7.6 },
      ];

      positions.forEach((pos) => {
        const div = document.createElement('div');
        div.classList.add('bow');
        div.innerHTML = bowSVG;
        div.style.width = pos.size + 'px';
        div.style.height = 'auto';
        if (pos.top) div.style.top = pos.top;
        if (pos.bottom) div.style.bottom = pos.bottom;
        if (pos.left) div.style.left = pos.left;
        if (pos.right) div.style.right = pos.right;
        div.style.animationDelay = pos.delay + 's, ' + (pos.delay * 0.5) + 's';
        div.style.animationDuration = pos.duration + 's, 1.5s';
        container.appendChild(div);
      });
    })();
  </script>
</body>
</html>
